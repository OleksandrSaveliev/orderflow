spring:
  application:
    name: orderflow

  datasource:
    url: jdbc:postgresql://localhost:5432/orderflow
    username: root
    password: root
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-for-jwt-generation-must-be-long-enough}
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

server:
  port: 8080
